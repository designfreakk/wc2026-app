# Theme experiment: getfast.ai-inspired design language.
# getfast.ai uses ONE typeface for both body and headings — the commercial face
# Mundial. Mundial isn't on any free CDN, so we use Inter, which is getfast.ai's
# own declared fallback (--font-secondary: "Inter"): a single clean sans for body
# and subheadings, differing only by weight/size. Clean white canvas, near-black
# ink, one vivid red accent, JetBrains Mono for code.
[theme]
primaryColor = "#fc0017"             # vivid signature red — buttons, sliders, accents
backgroundColor = "#ffffff"          # clean white canvas
secondaryBackgroundColor = "#f7f9fb" # cool off-white for sidebar + cards
textColor = "#212529"                # near-black ink
linkColor = "#fc0017"                # red links keep the palette single-accent
font = "Inter"                       # body — getfast.ai's sanctioned fallback for Mundial
headingFont = "Inter"                # headings: same family as body (getfast.ai style)
codeFont = "JetBrains Mono"          # code blocks
baseRadius = "0.75rem"               # soft, rounded corners

# Inter — single family for body + headings (regular / medium / semibold / bold)
[[theme.fontFaces]]
family = "Inter"
url = "https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-400-normal.woff2"
weight = 400
style = "normal"

[[theme.fontFaces]]
family = "Inter"
url = "https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-500-normal.woff2"
weight = 500
style = "normal"

[[theme.fontFaces]]
family = "Inter"
url = "https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-600-normal.woff2"
weight = 600
style = "normal"

[[theme.fontFaces]]
family = "Inter"
url = "https://cdn.jsdelivr.net/fontsource/fonts/inter@latest/latin-700-normal.woff2"
weight = 700
style = "normal"

# JetBrains Mono — code blocks
[[theme.fontFaces]]
family = "JetBrains Mono"
url = "https://cdn.jsdelivr.net/fontsource/fonts/jetbrains-mono@latest/latin-400-normal.woff2"
weight = 400
style = "normal"

[[theme.fontFaces]]
family = "JetBrains Mono"
url = "https://cdn.jsdelivr.net/fontsource/fonts/jetbrains-mono@latest/latin-500-normal.woff2"
weight = 500
style = "normal"
